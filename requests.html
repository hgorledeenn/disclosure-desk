<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Requests — Disclosure Desk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; color: #C7D2FE; text-decoration: none; transition: background-color 0.15s, color 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
    .nav-item.active { background: rgba(255,255,255,0.12); color: white; font-weight: 500; border-left: 2px solid white; padding-left: calc(0.75rem - 2px); }
    .pill { display: inline-flex; align-items: center; padding: 0.375rem 0.875rem; border-radius: 9999px; font-size: 0.8125rem; font-weight: 500; cursor: pointer; border: 1px solid #e2e8f0; transition: all 0.15s; gap: 0.375rem; background: #fff; color: #475569; }
    .pill.active { background-color: #4f46e5; color: #fff; border-color: #4f46e5; }
    .pill:not(.active):hover { background-color: #f8fafc; color: #1e293b; }
  </style>
</head>
<body class="bg-[#F5F7FF] min-h-screen">

  <!-- Sidebar -->
  <aside style="background:#1E1B4B" class="fixed inset-y-0 left-0 w-60 flex flex-col z-20">
    <div class="flex items-center gap-2.5 px-5 py-5 border-b border-white/10">
      <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </div>
      <span class="text-white font-bold text-base tracking-tight">Disclosure Desk</span>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
      <a href="dashboard.html" class="nav-item">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Dashboard
      </a>
      <a href="requests.html" class="nav-item active">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
        My Requests
      </a>
      <a href="new-request.html" class="nav-item">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Log a Request
      </a>
      <a href="draft-request.html" class="nav-item">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
        </svg>
        Draft a Request
      </a>
      <a href="agency-insights.html" class="nav-item">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        Agency Insights
        <span style="margin-left:auto;font-size:10px;background:rgba(165,180,252,0.2);color:#A5B4FC;padding:2px 6px;border-radius:4px;font-weight:600">Pro</span>
      </a>
      <a href="settings.html" class="nav-item">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        Settings
      </a>
    </nav>
    <div class="px-3 py-4 border-t border-white/10">
      <div class="flex items-center gap-3 px-2">
        <div class="w-8 h-8 bg-indigo-400 rounded-full flex items-center justify-center flex-shrink-0">
          <span class="text-white text-xs font-bold">JD</span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-white text-sm font-medium truncate">Jane Doe</p>
          <p class="text-indigo-300 text-xs truncate">jane@example.com</p>
        </div>
        <a href="index.html" class="text-indigo-300 hover:text-white transition-colors" title="Log out">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </a>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="ml-60 min-h-screen" style="background:#F5F7FF">

    <!-- Header -->
    <div class="px-10 pt-8 pb-6 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-slate-900">My Requests</h1>
      <a href="new-request.html" class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2.5 rounded-lg transition-colors shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Log a Request
      </a>
    </div>

    <div class="px-10 pb-12">

      <!-- Search -->
      <div class="relative mb-4">
        <svg class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input
          type="search"
          id="searchInput"
          placeholder="Search by agency or subject…"
          class="w-full pl-10 pr-4 py-2.5 border border-slate-200 bg-white rounded-xl text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"
          oninput="filterRequests()"
        />
      </div>

      <!-- Filter Pills -->
      <div class="flex items-center gap-2 mb-6 flex-wrap">
        <button class="pill active" onclick="setFilter('all', this)">All <span id="countAll" class="opacity-70 ml-0.5"></span></button>
        <button class="pill" onclick="setFilter('attention', this)">Needs Attention <span id="countAttention" class="opacity-70 ml-0.5"></span></button>
        <button class="pill" onclick="setFilter('active', this)">Active <span id="countActive" class="opacity-70 ml-0.5"></span></button>
        <button class="pill" onclick="setFilter('done', this)">Done <span id="countDone" class="opacity-70 ml-0.5"></span></button>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <table class="w-full">
          <thead>
            <tr class="border-b border-slate-100 bg-slate-50/80">
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3.5">Agency</th>
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-4 py-3.5">Subject</th>
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-4 py-3.5">Jurisdiction</th>
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-4 py-3.5">Deadline</th>
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-4 py-3.5">Status</th>
              <th class="px-6 py-3.5"></th>
            </tr>
          </thead>
          <tbody id="requestsTableBody" class="divide-y divide-slate-50">
            <!-- Populated by JS -->
          </tbody>
        </table>
        <div id="emptyState" class="hidden px-6 py-14 text-center">
          <svg class="w-9 h-9 text-slate-200 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
          <p class="text-slate-400 text-sm">No requests match your filter.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script>
    let currentFilter = 'all';
    let currentSearch = '';

    const STATUS_BADGES = {
      submitted:    { label: 'Submitted',        cls: 'bg-slate-50 text-slate-500 border border-slate-200' },
      acknowledged: { label: 'Waiting',          cls: 'bg-sky-50 text-sky-700 border border-sky-200' },
      processing:   { label: 'Processing',       cls: 'bg-amber-50 text-amber-700 border border-amber-200' },
      responded:    { label: 'Responded',        cls: 'bg-emerald-50 text-emerald-700 border border-emerald-200' },
      appealed:     { label: 'Appeal filed',     cls: 'bg-orange-50 text-orange-700 border border-orange-200' },
      closed:       { label: 'Done',             cls: 'bg-slate-50 text-slate-500 border border-slate-200' },
      overdue:      { label: 'Follow up needed', cls: 'bg-rose-50 text-rose-700 border border-rose-200' }
    };

    const JX_BADGES = {
      'Federal FOIA': 'bg-blue-50 text-blue-700 border border-blue-200',
      'NY FOIL':      'bg-indigo-50 text-indigo-700 border border-indigo-200',
    };

    function statusBadge(status) {
      const s = STATUS_BADGES[status] || { label: status, cls: 'bg-slate-50 text-slate-500 border border-slate-200' };
      return `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ${s.cls}">${s.label}</span>`;
    }

    function jxBadge(jx) {
      const cls = JX_BADGES[jx] || 'bg-slate-50 text-slate-500 border border-slate-200';
      return `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ${cls}">${jx}</span>`;
    }

    function shortDate(dateStr) {
      if (!dateStr) return '<span class="text-slate-300">TBD</span>';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function isAttention(r) {
      if (r.status === 'closed' || r.status === 'responded') return false;
      if (r.status === 'overdue') return true;
      if (r.deadline) {
        const d = getDaysUntilDeadline(r.deadline);
        return d !== null && d <= 7;
      }
      return false;
    }

    function getFilteredRequests() {
      return MOCK_REQUESTS.filter(r => {
        if (currentFilter === 'attention') {
          if (!isAttention(r)) return false;
        }
        if (currentFilter === 'active') {
          const ACTIVE = ['submitted', 'acknowledged', 'processing', 'appealed'];
          if (!ACTIVE.includes(r.status)) return false;
        }
        if (currentFilter === 'done') {
          if (!['responded', 'closed'].includes(r.status)) return false;
        }
        if (currentSearch) {
          const q = currentSearch.toLowerCase();
          return (r.agencyAbbr || '').toLowerCase().includes(q) ||
                 (r.agencyFull || '').toLowerCase().includes(q) ||
                 r.subject.toLowerCase().includes(q);
        }
        return true;
      });
    }

    function updateCounts() {
      document.getElementById('countAll').textContent = MOCK_REQUESTS.length;
      document.getElementById('countAttention').textContent = MOCK_REQUESTS.filter(isAttention).length;
      document.getElementById('countActive').textContent = MOCK_REQUESTS.filter(r => ['submitted','acknowledged','processing','appealed'].includes(r.status)).length;
      document.getElementById('countDone').textContent = MOCK_REQUESTS.filter(r => ['responded','closed'].includes(r.status)).length;
    }

    function renderTable() {
      const tbody = document.getElementById('requestsTableBody');
      const empty = document.getElementById('emptyState');
      const rows = getFilteredRequests();

      if (rows.length === 0) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      tbody.innerHTML = rows.map(r => {
        const subject = r.subject.length > 60 ? r.subject.substring(0, 60) + '…' : r.subject;
        return `<tr class="hover:bg-slate-50 transition-colors cursor-pointer" onclick="window.location='request.html#${r.id}'">
          <td class="px-6 py-4">
            <div>
              <span class="inline-block bg-indigo-50 text-indigo-700 text-xs font-semibold px-2 py-0.5 rounded mb-1">${r.agencyAbbr || r.agency}</span>
              <div class="text-xs text-slate-400 leading-snug">${r.agencyFull}</div>
            </div>
          </td>
          <td class="px-4 py-4 max-w-xs">
            <span class="text-sm text-slate-700 leading-snug">${subject}</span>
          </td>
          <td class="px-4 py-4">${jxBadge(r.jurisdiction)}</td>
          <td class="px-4 py-4 text-sm text-slate-500 whitespace-nowrap">${shortDate(r.deadline)}</td>
          <td class="px-4 py-4">${statusBadge(r.status)}</td>
          <td class="px-6 py-4 text-right">
            <a href="request.html#${r.id}" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium whitespace-nowrap" onclick="event.stopPropagation()">View &rarr;</a>
          </td>
        </tr>`;
      }).join('');
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTable();
    }

    function filterRequests() {
      currentSearch = document.getElementById('searchInput').value;
      renderTable();
    }

    updateCounts();
    renderTable();
  </script>
</body>
</html>
