<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request — Disclosure Desk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .serif { font-family: 'Playfair Display', Georgia, serif; }
    .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; color: #C7D2FE; text-decoration: none; transition: background-color 0.15s, color 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
    .nav-item.active { background: rgba(255,255,255,0.12); color: white; font-weight: 500; border-left: 2px solid white; padding-left: calc(0.75rem - 2px); }
    .timeline-dot { width: 0.5rem; height: 0.5rem; border-radius: 9999px; background: #a5b4fc; flex-shrink: 0; margin-top: 0.3125rem; }
    .timeline-line { width: 1px; background: #e2e8f0; margin-left: 3px; flex-shrink: 0; }
  </style>
</head>
<body class="bg-[#F5F7FF] min-h-screen">

  <!-- Mobile top bar -->
  <header class="lg:hidden fixed top-0 left-0 right-0 z-30 flex items-center justify-between px-4 py-3 shadow-sm" style="background:#1E1B4B">
    <span class="serif text-white" style="font-size:18px;font-weight:700;letter-spacing:-0.01em">Disclosure Desk</span>
    <button onclick="openSidebar()" class="text-white p-1 rounded-lg hover:bg-white/10 transition-colors" aria-label="Open menu">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </header>

  <!-- Sidebar overlay -->
  <div id="sidebar-overlay" onclick="closeSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

  <!-- Sidebar -->
  <aside id="sidebar" style="background:#1E1B4B" class="fixed inset-y-0 left-0 w-60 flex flex-col z-40 transition-transform duration-300 ease-in-out -translate-x-full lg:translate-x-0">
    <a href="dashboard.html" class="flex items-center gap-2.5 px-5 py-5 border-b border-white/10 hover:bg-white/5 transition-colors">
      <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </div>
      <span class="serif text-white" style="font-size:19px;font-weight:700;letter-spacing:-0.01em;line-height:1.2">Disclosure Desk</span>
    </a>
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
      <a href="dashboard.html" class="nav-item">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Dashboard
      </a>
      <a href="new-request.html" class="nav-item">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Log a Request
      </a>
      <a href="draft-request.html" class="nav-item">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
        </svg>
        Draft a Request
        <span style="margin-left:auto;font-size:10px;background:rgba(165,180,252,0.2);color:#A5B4FC;padding:2px 6px;border-radius:4px;font-weight:600">Pro</span>
      </a>
      <a href="agency-insights.html" class="nav-item">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        Agency Insights
        <span style="margin-left:auto;font-size:10px;background:rgba(165,180,252,0.2);color:#A5B4FC;padding:2px 6px;border-radius:4px;font-weight:600">Pro</span>
      </a>
      <a href="settings.html" class="nav-item">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        Settings
      </a>
    </nav>
    <div class="px-3 py-4 border-t border-white/10">
      <div class="flex items-center gap-3 px-2">
        <div class="w-8 h-8 bg-indigo-400 rounded-full flex items-center justify-center flex-shrink-0">
          <span id="sidebar-user-initials" class="text-white text-xs font-bold">JD</span>
        </div>
        <div class="flex-1 min-w-0">
          <p id="sidebar-user-name" class="text-white text-sm font-medium truncate">Jane Doe</p>
          <p id="sidebar-user-email" class="text-indigo-300 text-xs truncate">jane@example.com</p>
        </div>
        <a href="index.html" class="text-indigo-300 hover:text-white transition-colors" title="Log out">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </a>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="ml-0 lg:ml-60 min-h-screen pt-14 lg:pt-0" style="background:#F5F7FF" id="mainContent">
    <!-- Populated by JS -->
  </main>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/content.js"></script>
  <script src="js/apply-content.js"></script>
  <script>
    function openSidebar() {
      document.getElementById('sidebar').classList.remove('-translate-x-full');
      document.getElementById('sidebar-overlay').classList.remove('hidden');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.add('-translate-x-full');
      document.getElementById('sidebar-overlay').classList.add('hidden');
    }

    const STATUS_BADGES = {
      submitted:    { label: 'Submitted',        cls: 'bg-slate-50 text-slate-500 border border-slate-200' },
      acknowledged: { label: 'Waiting',          cls: 'bg-sky-50 text-sky-700 border border-sky-200' },
      processing:   { label: 'Processing',       cls: 'bg-amber-50 text-amber-700 border border-amber-200' },
      responded:    { label: 'Responded',        cls: 'bg-emerald-50 text-emerald-700 border border-emerald-200' },
      appealed:     { label: 'Appeal filed',     cls: 'bg-orange-50 text-orange-700 border border-orange-200' },
      closed:       { label: 'Done',             cls: 'bg-emerald-50 text-emerald-700 border border-emerald-200' },
      overdue:      { label: 'Follow up needed', cls: 'bg-rose-50 text-rose-700 border border-rose-200' }
    };

    function plainBadge(status) {
      const s = STATUS_BADGES[status] || { label: status, cls: 'bg-slate-50 text-slate-500 border border-slate-200' };
      return `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ${s.cls}">${s.label}</span>`;
    }

    function jurisdictionBadge(jx) {
      if (!jx) return '';
      const cls = jx === 'Federal FOIA'
        ? 'bg-sky-100 text-sky-700'
        : 'bg-indigo-100 text-indigo-700';
      return `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold ${cls}">${jx}</span>`;
    }

    function renderRequest() {
      const hash = window.location.hash.replace('#', '');
      const requestId = hash || '1';
      const req = Store.getRequest(requestId);
      if (!req) return;

      document.title = `${req.agency} — Disclosure Desk`;

      const days = getDaysUntilDeadline(req.deadline);
      const isResolved = req.status === 'closed' || req.status === 'responded';

      // Deadline urgency box (top-right of header)
      let urgencyBoxHTML = '';
      if (req.deadline && !isResolved) {
        let boxStyle, numStyle, label;
        if (days < 0) {
          boxStyle = 'background:#FFF1F2;border:1px solid #FECDD3;';
          numStyle  = 'color:#E11D48;';
          label     = `day${Math.abs(days) === 1 ? '' : 's'} overdue`;
        } else if (days <= 3) {
          boxStyle = 'background:#FFF1F2;border:1px solid #FECDD3;';
          numStyle  = 'color:#E11D48;';
          label     = `day${days === 1 ? '' : 's'} left`;
        } else if (days <= 7) {
          boxStyle = 'background:#FFFBEB;border:1px solid #FDE68A;';
          numStyle  = 'color:#D97706;';
          label     = 'days left';
        } else {
          boxStyle = 'background:#F8FAFC;border:1px solid #E2E8F0;';
          numStyle  = 'color:#334155;';
          label     = 'days left';
        }
        urgencyBoxHTML = `<div class="flex-shrink-0 rounded-2xl px-7 py-4 text-center" style="${boxStyle}">
          <div class="text-4xl font-bold leading-none" style="${numStyle}">${Math.abs(days)}</div>
          <div class="text-xs text-slate-500 mt-1.5 whitespace-nowrap">${label}</div>
        </div>`;
      }

      // Full timeline (left column)
      const timelineHTML = [...req.notes].reverse().map((note, idx) => {
        const isLast = idx === req.notes.length - 1;
        return `<div class="flex gap-3.5">
          <div class="flex flex-col items-center pt-0.5">
            <div class="timeline-dot"></div>
            ${!isLast ? '<div class="timeline-line flex-1 mt-1" style="min-height:1.75rem"></div>' : ''}
          </div>
          <div class="pb-5 flex-1">
            <div class="text-xs text-slate-400 mb-0.5">${formatDate(note.date)}</div>
            <div class="text-sm text-slate-700 leading-relaxed">${note.text}</div>
          </div>
        </div>`;
      }).join('');

      // Abbreviated recent activity (right sidebar — last 4 notes)
      const recentHTML = [...req.notes].reverse().slice(0, 4).map((note, idx, arr) => {
        const short = note.text.length > 90 ? note.text.slice(0, 90) + '…' : note.text;
        const isLast = idx === arr.length - 1;
        return `<div class="${isLast ? '' : 'border-b border-slate-50'} py-2.5">
          <div class="text-[11px] text-slate-400 mb-0.5">${formatDate(note.date)}</div>
          <div class="text-xs text-slate-600 leading-relaxed">${short}</div>
        </div>`;
      }).join('');

      // Documents
      const docsListHTML = (req.documents && req.documents.length > 0)
        ? req.documents.map(doc => `
          <a href="#" onclick="event.preventDefault()" class="flex items-center gap-2.5 py-2 hover:text-indigo-700 transition-colors group">
            <svg class="w-4 h-4 text-slate-400 group-hover:text-indigo-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <span class="text-sm text-slate-600 group-hover:text-indigo-700">${doc}</span>
          </a>`).join('')
        : '<p class="text-sm text-slate-400 py-1">No documents attached yet.</p>';

      // Community data (right sidebar)
      const q = (req.agencyAbbr || req.agency || '').toLowerCase();
      const agencyLower = (req.agency || '').toLowerCase();
      const match = AGENCY_INSIGHTS.find(a =>
        a.agency.toLowerCase().includes(q) ||
        a.abbr.toLowerCase().includes(q) ||
        q.includes(a.abbr.toLowerCase()) ||
        agencyLower.includes(a.agency.toLowerCase())
      );
      const communityHTML = match
        ? `<div class="grid grid-cols-3 gap-2 mb-2">
            <div class="text-center">
              <p class="text-base font-bold text-slate-900">${match.avgDays}d</p>
              <p class="text-[10px] text-slate-400 leading-snug">avg response</p>
            </div>
            <div class="text-center">
              <p class="text-base font-bold text-slate-900">${match.withinDeadline}%</p>
              <p class="text-[10px] text-slate-400 leading-snug">on time</p>
            </div>
            <div class="text-center">
              <p class="text-base font-bold text-slate-900">${match.successRate}%</p>
              <p class="text-[10px] text-slate-400 leading-snug">success</p>
            </div>
          </div>
          <p class="text-[10px] text-slate-400 text-center">${match.dataPoints.toLocaleString()} community requests</p>`
        : '<p class="text-xs text-slate-400">No community data yet for this agency.</p>';

      // Reminders
      const remindersHTML = (req.reminderDays || []).map(d => {
        const label = d === 14 ? '2 weeks before' : d === 7 ? '1 week before' : d === 3 ? '3 days before' : d === 1 ? '1 day before' : `${d} days before`;
        return `<label class="flex items-center gap-2.5 cursor-pointer py-0.5">
          <input type="checkbox" checked class="w-3.5 h-3.5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500" />
          <span class="text-xs text-slate-600">${label}</span>
        </label>`;
      }).join('');

      const html = `
        <!-- ── Page header ───────────────────────────────────────── -->
        <div class="bg-white border-b border-slate-100">
          <div class="px-4 sm:px-6 lg:px-10 pt-8 pb-7">
            <a href="dashboard.html" class="inline-flex items-center gap-1.5 text-sm text-slate-400 hover:text-indigo-600 transition-colors mb-6">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
              </svg>
              Dashboard
            </a>

            <div class="flex items-start gap-6">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap mb-3">
                  <span class="inline-flex items-center rounded-lg px-3 py-1 text-sm font-bold bg-indigo-100 text-indigo-800">${req.agencyAbbr || req.agency}</span>
                  ${jurisdictionBadge(req.jurisdiction)}
                  ${plainBadge(req.status)}
                </div>
                <h1 class="text-3xl font-bold text-slate-900 serif leading-tight">${req.agency}</h1>
                <p class="text-base text-slate-500 mt-2.5 leading-relaxed">${req.subject}</p>
              </div>
              ${urgencyBoxHTML}
            </div>
          </div>
        </div>

        <!-- ── Two-column body ───────────────────────────────────── -->
        <div class="px-4 sm:px-6 lg:px-10 py-8 flex flex-col lg:flex-row gap-6 items-start">

          <!-- Left: primary working area -->
          <div class="flex-1 min-w-0 space-y-5">

            <!-- Notes & Timeline -->
            <section class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
              <h2 class="text-sm font-semibold text-slate-700 mb-5">Notes &amp; Timeline</h2>
              <div class="mb-6">
                <textarea
                  id="newNoteText"
                  rows="3"
                  class="w-full px-3.5 py-3 border border-slate-200 rounded-xl text-sm text-slate-700 placeholder-slate-400 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-sans"
                  placeholder="Add a note — follow-up call, status update, new information…"
                ></textarea>
                <div class="flex items-center justify-between mt-2">
                  <span class="text-xs text-slate-400">Will be dated today.</span>
                  <button onclick="addNote()" class="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold rounded-lg transition-colors">
                    Save note
                  </button>
                </div>
              </div>
              <div id="timelineArea">${timelineHTML}</div>
            </section>

            <!-- Documents -->
            <section class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
              <h2 class="text-sm font-semibold text-slate-700 mb-4">Documents</h2>
              <div class="mb-4 divide-y divide-slate-50">${docsListHTML}</div>
              <div
                onclick="alert('File upload — demo only')"
                class="border-2 border-dashed border-slate-200 rounded-xl p-5 text-center hover:border-indigo-300 hover:bg-indigo-50/50 transition-colors cursor-pointer"
              >
                <svg class="w-5 h-5 text-slate-300 mx-auto mb-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
                <div class="text-sm text-slate-500 font-medium">Upload a document</div>
                <div class="text-xs text-slate-400 mt-0.5">PDF, DOCX, or image</div>
              </div>
            </section>

          </div>

          <!-- Right: sticky sidebar -->
          <div class="w-full lg:w-72 flex-shrink-0">
            <div class="sticky top-6 space-y-4">

              <!-- Request details -->
              <section class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                <h2 class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-4">Request Details</h2>
                <dl class="space-y-3">
                  ${req.submitted ? `<div>
                    <dt class="text-[11px] text-slate-400 mb-0.5">Filed</dt>
                    <dd class="text-sm text-slate-700 font-medium">${formatDate(req.submitted)}</dd>
                  </div>` : ''}
                  ${req.deadline ? `<div>
                    <dt class="text-[11px] text-slate-400 mb-0.5">Deadline</dt>
                    <dd class="text-sm text-slate-700 font-medium">${formatDate(req.deadline)}</dd>
                  </div>` : ''}
                  ${req.trackingNumber ? `<div>
                    <dt class="text-[11px] text-slate-400 mb-0.5">Tracking #</dt>
                    <dd class="text-sm text-slate-700 font-mono tracking-tight">${req.trackingNumber}</dd>
                  </div>` : ''}
                  ${req.contactName ? `<div>
                    <dt class="text-[11px] text-slate-400 mb-0.5">Contact</dt>
                    <dd class="text-sm text-slate-700">${req.contactName}</dd>
                    ${req.contactEmail ? `<dd class="mt-0.5"><a href="mailto:${req.contactEmail}" class="text-xs text-indigo-600 hover:text-indigo-800 break-all">${req.contactEmail}</a></dd>` : ''}
                  </div>` : ''}
                </dl>
              </section>

              <!-- Community data -->
              <section class="bg-indigo-50 border border-indigo-100 rounded-2xl p-5">
                <div class="flex items-center justify-between mb-3">
                  <h2 class="text-[11px] font-semibold text-indigo-700 uppercase tracking-wider">Community Data</h2>
                  <a href="agency-insights.html" class="text-[11px] text-indigo-600 hover:text-indigo-800 font-medium">Details →</a>
                </div>
                ${communityHTML}
              </section>

              <!-- Email reminders -->
              ${remindersHTML ? `<section class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                <h2 class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-3">Email Reminders</h2>
                <div class="space-y-2">${remindersHTML}</div>
                <p class="text-[10px] text-slate-400 mt-3">Sent to ${Store.getUser().email || 'jane@example.com'}</p>
              </section>` : ''}

              <!-- Quick actions -->
              <section class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                <h2 class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-3">Actions</h2>
                <div class="space-y-1.5">
                  <button onclick="markResponded()" class="w-full text-left text-sm text-slate-600 hover:text-emerald-700 py-1 font-medium transition-colors">Mark as responded</button>
                  <button onclick="fileAppeal()" class="w-full text-left text-sm text-slate-600 hover:text-orange-700 py-1 font-medium transition-colors">File appeal</button>
                  <button onclick="closeRequest()" class="w-full text-left text-sm text-slate-600 hover:text-slate-900 py-1 font-medium transition-colors">Close request</button>
                  <button onclick="deleteReq()" class="w-full text-left text-sm text-rose-400 hover:text-rose-600 py-1 font-medium transition-colors mt-2 pt-2 border-t border-slate-100">Delete request</button>
                </div>
              </section>

              <!-- Recent activity (abbreviated timeline) -->
              ${recentHTML ? `<section class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                <h2 class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1">Recent Activity</h2>
                ${recentHTML}
              </section>` : ''}

            </div>
          </div>

        </div>
      `;

      document.getElementById('mainContent').innerHTML = html;
    }

    function currentId() {
      return window.location.hash.replace('#', '') || '1';
    }

    function addNote() {
      const textarea = document.getElementById('newNoteText');
      const text = textarea ? textarea.value.trim() : '';
      if (!text) { alert('Please enter a note before saving.'); return; }
      Store.addNote(currentId(), text);
      textarea.value = '';
      renderRequest();
    }

    function markResponded() {
      Store.updateStatus(currentId(), 'responded');
      renderRequest();
    }

    function fileAppeal() {
      Store.addNote(currentId(), 'Appeal filed.');
      Store.updateStatus(currentId(), 'appealed');
      renderRequest();
    }

    function closeRequest() {
      if (!confirm('Close this request?')) return;
      Store.updateStatus(currentId(), 'closed');
      renderRequest();
    }

    function deleteReq() {
      if (!confirm('Permanently delete this request?')) return;
      Store.deleteRequest(currentId());
      window.location.href = 'dashboard.html';
    }

    renderRequest();

    window.addEventListener('hashchange', () => {
      renderRequest();
      window.scrollTo(0, 0);
    });
  </script>
</body>
</html>
